# caiji-mvp - nginx 权威配置
# 部署位置: /etc/nginx/sites-available/caiji (软链到 sites-enabled/)
# 同步方式: infra/scripts/provision.sh 通过阿里云云助手 RunCommand 下发
#
# 复刻 zhaoshang infra/nginx/fengyun.conf 的安全等级
# (Mozilla intermediate + SSL Labs A+，HSTS / HTTP/2 / 安全 headers 4 件套)
#
# 业务: 接收廖总 Windows 上 NapCat 推送的 OneBot 11 群消息事件
#       → 反代到本机 127.0.0.1:8090 (FastAPI/uvicorn)

# === HTTPS server (主流量) ===
server {
    listen 443 ssl http2;
    server_name caiji.tianku.com;

    # 证书路径 (certbot 管理)
    ssl_certificate /etc/letsencrypt/live/caiji.tianku.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caiji.tianku.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 安全 headers 4 件套
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 注: Let's Encrypt 2024-12-05 起停止 OCSP, 故不配 ssl_stapling

    # NapCat 上报入口 (廖总 Win NapCat HTTP 客户端填这个 URL)
    location /onebot/event {
        proxy_pass http://127.0.0.1:8090/onebot/event;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # NapCat 单条群消息一般 < 10KB, 但合并转发可能大
        client_max_body_size 5M;
        # 同步上报: NapCat 等响应
        proxy_read_timeout 30s;
    }

    # 健康检查 + 数据查询 API (内部用)
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 5M;
}

# === HTTP -> HTTPS 强制跳转 ===
server {
    if ($host = caiji.tianku.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name caiji.tianku.com;
    return 404; # managed by Certbot
}
